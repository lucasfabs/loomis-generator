<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Outil gratuit pour s'entraîner au dessin de têtes en perspective avec la méthode Loomis.">
  <meta property="og:title" content="Loomis Head Trainer">
  <meta property="og:description" content="Génère des angles de tête aléatoires pour t'entraîner au dessin.">
  <meta property="og:url" content="https://lucasfabs.github.io/loomis-generator/">
  <title>Loomis Head Trainer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #494949;
      color: #fff;
    }

    #viewport {
      position: fixed;
      inset: 0;
      background: #494949;
    }

    #viewport canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: min(280px, calc(100vw - 1.5rem));
      pointer-events: none;
    }

    #hud > * {
      pointer-events: auto;
    }

    #model-selector {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .model-tab {
      padding: 0.25rem 0.5rem;
      border: 1px solid #666;
      background: #494949;
      color: #aaa;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .model-tab:hover:not(.active) {
      color: #fff;
      border-color: #999;
    }

    .model-tab.active {
      border-color: #fff;
      color: #fff;
    }

    #error-message {
      display: none;
      padding: 0.4rem 0.5rem;
      border: 1px solid #666;
      background: rgba(0, 0, 0, 0.7);
      color: #ccc;
      font-size: 0.65rem;
      line-height: 1.35;
    }

    #error-message.visible {
      display: block;
    }

    .hud-row {
      display: grid;
      grid-template-columns: 1rem 1fr 2.25rem;
      align-items: center;
      gap: 0.4rem;
      background: rgba(0, 0, 0, 0.6);
      padding: 0.3rem 0.4rem;
      border: 1px solid #333;
    }

    .hud-row--wide {
      grid-template-columns: 2.25rem 1fr 2.5rem;
    }

    .hud-row label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
    }

    .hud-row .slider-value {
      font-size: 0.65rem;
      font-variant-numeric: tabular-nums;
      color: #ccc;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      appearance: none;
      background: #444;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }

    #btn-random {
      padding: 0.4rem 0.75rem;
      border: 1px solid #fff;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      align-self: flex-start;
    }

    #btn-random:hover {
      background: #222;
    }

    #btn-random:active {
      background: #333;
    }

    @media (max-width: 480px) {
      #hud {
        padding: 0.5rem;
        gap: 0.35rem;
        max-width: min(240px, calc(100vw - 1rem));
      }

      .hud-row {
        grid-template-columns: 0.85rem 1fr 2rem;
        gap: 0.3rem;
        padding: 0.25rem 0.35rem;
      }

      .hud-row label,
      .hud-row .slider-value {
        font-size: 0.6rem;
      }

      #btn-random {
        font-size: 0.65rem;
        padding: 0.35rem 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="hud">
      <div id="model-selector"></div>
      <div id="error-message"></div>

      <div class="hud-row">
        <label for="slider-x">X</label>
        <input type="range" id="slider-x" min="-45" max="45" value="0" step="1">
        <span class="slider-value" id="val-x">0°</span>
      </div>

      <div class="hud-row">
        <label for="slider-y">Y</label>
        <input type="range" id="slider-y" min="-180" max="180" value="0" step="1">
        <span class="slider-value" id="val-y">0°</span>
      </div>

      <div class="hud-row">
        <label for="slider-z">Z</label>
        <input type="range" id="slider-z" min="-45" max="45" value="0" step="1">
        <span class="slider-value" id="val-z">0°</span>
      </div>

      <div class="hud-row hud-row--wide">
        <label for="slider-zoom">Zoom</label>
        <input type="range" id="slider-zoom" min="50" max="150" value="100" step="5">
        <span class="slider-value" id="val-zoom">100%</span>
      </div>

      <button id="btn-random" type="button">Random</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    const MODELS = [
      { id: 'loomis_head', label: 'Head', path: 'models/loomis_head.glb' },
      { id: 'loomis_planes', label: 'Planes', path: 'models/loomis_head_-_planes__essential_form.glb' },
      { id: 'loomis_neck', label: 'Cou', path: 'models/loomis_head_study_with_a_neck.glb' }
    ];

    const AXES = {
      x: { min: -45, max: 45 },
      y: { min: -180, max: 180 },
      z: { min: -45, max: 45 }
    };

    const TARGET_SIZE = 1.6;
    const CAMERA_PADDING = 1.7;
    const Y_LIFT_RATIO = 0.3;

    const rotation = { x: 0, y: 0, z: 0 };

    let cameraZoom = 1;
    let baseCameraDistance = 5;
    const lookAtCenter = new THREE.Vector3();

    let activeModelId = MODELS[0].id;

    const viewport = document.getElementById('viewport');
    const modelSelector = document.getElementById('model-selector');
    const errorMessage = document.getElementById('error-message');
    const sliderX = document.getElementById('slider-x');
    const sliderY = document.getElementById('slider-y');
    const sliderZ = document.getElementById('slider-z');
    const valX = document.getElementById('val-x');
    const valY = document.getElementById('val-y');
    const valZ = document.getElementById('val-z');
    const sliderZoom = document.getElementById('slider-zoom');
    const valZoom = document.getElementById('val-zoom');
    const btnRandom = document.getElementById('btn-random');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x494949);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    viewport.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 8, 5);
    scene.add(directionalLight);

    const modelGroup = new THREE.Group();
    const contentGroup = new THREE.Group();
    modelGroup.add(contentGroup);
    scene.add(modelGroup);

    const loader = new THREE.GLTFLoader();

    function fitModelToScene(object) {
      object.position.set(0, 0, 0);
      object.scale.set(1, 1, 1);
      object.updateMatrixWorld(true);

      let box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      box.getSize(size);

      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim > 0) {
        object.scale.setScalar(TARGET_SIZE / maxDim);
      }

      object.updateMatrixWorld(true);
      box = new THREE.Box3().setFromObject(object);
      const center = new THREE.Vector3();
      box.getCenter(center);
      object.position.sub(center);

      box.getSize(size);
      object.position.y += size.y * Y_LIFT_RATIO;
    }

    function applyCameraPosition() {
      const distance = baseCameraDistance / cameraZoom;
      camera.position.set(lookAtCenter.x, lookAtCenter.y, lookAtCenter.z + distance);
      camera.lookAt(lookAtCenter);
    }

    function frameCameraToContent() {
      if (contentGroup.children.length === 0) return;

      contentGroup.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(contentGroup);
      const size = new THREE.Vector3();
      box.getCenter(lookAtCenter);
      box.getSize(size);

      const maxDim = Math.max(size.x, size.y, size.z);
      const fovRad = camera.fov * (Math.PI / 180);
      baseCameraDistance = (maxDim / 2) / Math.tan(fovRad / 2) * CAMERA_PADDING;

      applyCameraPosition();
    }

    function applyRotation() {
      modelGroup.rotation.set(
        THREE.MathUtils.degToRad(rotation.x),
        THREE.MathUtils.degToRad(rotation.y),
        THREE.MathUtils.degToRad(rotation.z)
      );
    }

    function updateSliderUI() {
      sliderX.value = rotation.x;
      sliderY.value = rotation.y;
      sliderZ.value = rotation.z;
      valX.textContent = Math.round(rotation.x) + '°';
      valY.textContent = Math.round(rotation.y) + '°';
      valZ.textContent = Math.round(rotation.z) + '°';
    }

    function updateZoomUI() {
      const percent = Math.round(cameraZoom * 100);
      sliderZoom.value = percent;
      valZoom.textContent = percent + '%';
    }

    function disposeObject(object) {
      object.traverse(function (node) {
        if (node.geometry) node.geometry.dispose();
        if (node.material) {
          if (Array.isArray(node.material)) {
            node.material.forEach(function (m) { m.dispose(); });
          } else {
            node.material.dispose();
          }
        }
      });
    }

    function clearContentGroup() {
      while (contentGroup.children.length > 0) {
        const child = contentGroup.children[0];
        contentGroup.remove(child);
        disposeObject(child);
      }
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('visible');
    }

    function hideError() {
      errorMessage.textContent = '';
      errorMessage.classList.remove('visible');
    }

    function createPlaceholderSphere() {
      const geometry = new THREE.SphereGeometry(1, 32, 32);
      const material = new THREE.MeshStandardMaterial({ color: 0x888888 });
      const sphere = new THREE.Mesh(geometry, material);
      fitModelToScene(sphere);
      return sphere;
    }

    function addModelToScene(object) {
      clearContentGroup();
      contentGroup.add(object);
      frameCameraToContent();
      applyRotation();
    }

    function loadModel(modelConfig) {
      hideError();
      clearContentGroup();

      loader.load(
        modelConfig.path,
        function (gltf) {
          if (activeModelId !== modelConfig.id) return;

          const model = gltf.scene;
          fitModelToScene(model);
          addModelToScene(model);
        },
        undefined,
        function () {
          if (activeModelId !== modelConfig.id) return;

          showError(
            'Impossible de charger "' + modelConfig.label + '". ' +
            'Vérifiez ' + modelConfig.path + ' et utilisez un serveur local.'
          );

          addModelToScene(createPlaceholderSphere());
        }
      );
    }

    function selectModel(modelId) {
      if (activeModelId === modelId) return;

      activeModelId = modelId;

      const tabs = modelSelector.querySelectorAll('.model-tab');
      tabs.forEach(function (tab) {
        tab.classList.toggle('active', tab.dataset.id === modelId);
      });

      const config = MODELS.find(function (m) { return m.id === modelId; });
      if (config) loadModel(config);
    }

    function buildModelSelector() {
      MODELS.forEach(function (model, index) {
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'model-tab' + (index === 0 ? ' active' : '');
        tab.dataset.id = model.id;
        tab.textContent = model.label;
        tab.addEventListener('click', function () {
          selectModel(model.id);
        });
        modelSelector.appendChild(tab);
      });
    }

    function randomInRange(min, max) {
      return Math.round(min + Math.random() * (max - min));
    }

    function randomizeRotation() {
      rotation.x = randomInRange(AXES.x.min, AXES.x.max);
      rotation.y = randomInRange(AXES.y.min, AXES.y.max);
      rotation.z = randomInRange(AXES.z.min, AXES.z.max);
      updateSliderUI();
      applyRotation();
    }

    function onSliderInput(axis, value) {
      rotation[axis] = parseFloat(value);
      updateSliderUI();
      applyRotation();
    }

    function onZoomInput(value) {
      cameraZoom = parseFloat(value) / 100;
      updateZoomUI();
      applyCameraPosition();
    }

    sliderX.addEventListener('input', function () { onSliderInput('x', sliderX.value); });
    sliderY.addEventListener('input', function () { onSliderInput('y', sliderY.value); });
    sliderZ.addEventListener('input', function () { onSliderInput('z', sliderZ.value); });
    sliderZoom.addEventListener('input', function () { onZoomInput(sliderZoom.value); });

    btnRandom.addEventListener('click', randomizeRotation);

    function onResize() {
      const width = viewport.clientWidth;
      const height = viewport.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      frameCameraToContent();
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    buildModelSelector();
    loadModel(MODELS[0]);
    updateZoomUI();
    onResize();
    window.addEventListener('resize', onResize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
